// ═══════════════════════════════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════════════════════════════
const clock=new THREE.Clock();const fixedDt=1/60;let accum=0;
setTimeout(()=>{document.getElementById('controls-hint').style.opacity='0';},8000);

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.1);
  accum+=dt;

  const accel=keys['KeyW']||keys['ArrowUp'];
  const brake=keys['KeyS']||keys['ArrowDown'];
  const steerL=keys['KeyA']||keys['ArrowLeft'];
  const steerR=keys['KeyD']||keys['ArrowRight'];
  const handbrake=keys['Space'];

  // ── Steering — sluggish, heavy, GTA4 style ──
  let targetSteer=0;
  if(steerL) targetSteer=MAX_STEER;
  if(steerR) targetSteer=-MAX_STEER;
  if(targetSteer!==0) currentSteer+=(targetSteer-currentSteer)*Math.min(1,2.2*dt); // slower response (was 3.0)
  else{currentSteer*=Math.max(0,1-3.5*dt);if(Math.abs(currentSteer)<0.01)currentSteer=0;} // slower center (was 5.0)

  const speed=chassisBody.velocity.length();
  const steerFactor = 1 / (1 + speed * 0.09); // heavier reduction at speed (was 0.07)
  vehicle.setSteeringValue(currentSteer * steerFactor, 0);
  vehicle.setSteeringValue(currentSteer * steerFactor, 1);

  // ── Forward direction ──
  const fwdDir=new CANNON.Vec3(0,0,-1);
  chassisBody.quaternion.vmult(fwdDir,fwdDir);
  const forwardSpeed=chassisBody.velocity.dot(fwdDir);

  // ── Engine force (smoothed to prevent jitter) ──
  let targetEngineForce = 0;
  if (getWorstZoneHealth() <= 0) { targetEngineForce = 0; } // dead engine
  else if (accel) { targetEngineForce = MAX_ENGINE; }
  else if (brake) { targetEngineForce = forwardSpeed > 1.5 ? 0 : -MAX_ENGINE * 0.4; }
  // Smooth ramp-up (eliminates start jitter)
  smoothedEngineForce += (targetEngineForce - smoothedEngineForce) * Math.min(1, 6 * dt);
  vehicle.applyEngineForce(smoothedEngineForce, 2);
  vehicle.applyEngineForce(smoothedEngineForce, 3);

  // ── Drift detection ──
  const rightDir=new CANNON.Vec3(1,0,0);
  chassisBody.quaternion.vmult(rightDir,rightDir);
  const lateralSpeed=Math.abs(chassisBody.velocity.dot(rightDir));

  // ── Landing drift: detect airborne → grounded transition with lateral velocity ──
  const wheelsGrounded = vehicle.wheelInfos.filter(w=>w.raycastResult.body).length;
  const isAirborne = wheelsGrounded === 0;
  if (isAirborne) wasAirborne = true;
  if (wasAirborne && !isAirborne && lateralSpeed > 1.5) {
    // Just landed sideways - give a drift window
    landingDriftTimer = 1.2; // seconds of reduced friction
    wasAirborne = false;
  } else if (!isAirborne) {
    wasAirborne = false;
  }
  if (landingDriftTimer > 0) landingDriftTimer -= dt;
  const landingDrift = landingDriftTimer > 0;

  const isDrifting = lateralSpeed > 2.5 || handbrake || landingDrift;

  // ═══════════════════════════════════════════════════════════════════
  // SURFACE DETECTION — per-wheel surface blend (0=offroad, 1=road)
  // ═══════════════════════════════════════════════════════════════════
  const wheelPositions = []; // cache world positions for particles later
  for (let w = 0; w < 4; w++) {
    vehicle.updateWheelTransform(w);
    const wt = vehicle.wheelInfos[w].worldTransform;
    const wx = wt.position.x, wz = wt.position.z;
    wheelPositions.push({ x: wx, y: wt.position.y, z: wz });
    const onRoad = isOnRoad(wx, wz) ? 1.0 : 0.0;
    // Smooth interpolation over ~0.5s
    wheelSurfaceBlend[w] += (onRoad - wheelSurfaceBlend[w]) * Math.min(1, SURFACE_TRANSITION_SPEED * dt);
  }
  // Average surface blend for the whole car (used for sound crossfade etc.)
  const avgSurfaceBlend = (wheelSurfaceBlend[0] + wheelSurfaceBlend[1] + wheelSurfaceBlend[2] + wheelSurfaceBlend[3]) / 4;

  // ═══════════════════════════════════════════════════════════════════
  // SURFACE-DEPENDENT TIRE GRIP & SUSPENSION
  // ═══════════════════════════════════════════════════════════════════
  for (let w = 0; w < 4; w++) {
    const s = wheelSurfaceBlend[w]; // 0=offroad, 1=road
    const isFront = w < 2;

    // ── Grip: interpolate between road and offroad frictionSlip ──
    const gripRoad = isFront ? GRIP_ROAD_FRONT : GRIP_ROAD_REAR;
    const gripOff = isFront ? GRIP_OFFROAD_FRONT : GRIP_OFFROAD_REAR;
    let baseGrip = gripOff + (gripRoad - gripOff) * s;

    // ── Suspension stiffness per surface ──
    vehicle.wheelInfos[w].suspensionStiffness = SUSP_STIFF_OFFROAD + (SUSP_STIFF_ROAD - SUSP_STIFF_OFFROAD) * s;

    // ── Roll influence per surface ──
    vehicle.wheelInfos[w].rollInfluence = ROLL_INF_OFFROAD + (ROLL_INF_ROAD - ROLL_INF_OFFROAD) * s;

    // Store base grip for override by handbrake/drift/etc.
    vehicle.wheelInfos[w]._surfaceBaseGrip = baseGrip;
  }

  // ── Tire friction — modulated by surface grip ──
  if (handbrake) {
    // Front loses some grip but still steers; rear slides freely
    vehicle.wheelInfos[0].frictionSlip = vehicle.wheelInfos[0]._surfaceBaseGrip * 0.72;
    vehicle.wheelInfos[1].frictionSlip = vehicle.wheelInfos[1]._surfaceBaseGrip * 0.72;
    vehicle.wheelInfos[2].frictionSlip = vehicle.wheelInfos[2]._surfaceBaseGrip * 0.25;
    vehicle.wheelInfos[3].frictionSlip = vehicle.wheelInfos[3]._surfaceBaseGrip * 0.25;
    vehicle.setBrake(0, 0); vehicle.setBrake(0, 1);
    vehicle.setBrake(HANDBRAKE_F, 2); vehicle.setBrake(HANDBRAKE_F, 3);
  } else if (landingDrift) {
    // Landing sideways — reduced friction scaled by surface
    vehicle.wheelInfos[0].frictionSlip = vehicle.wheelInfos[0]._surfaceBaseGrip * 0.63;
    vehicle.wheelInfos[1].frictionSlip = vehicle.wheelInfos[1]._surfaceBaseGrip * 0.63;
    vehicle.wheelInfos[2].frictionSlip = vehicle.wheelInfos[2]._surfaceBaseGrip * 0.32;
    vehicle.wheelInfos[3].frictionSlip = vehicle.wheelInfos[3]._surfaceBaseGrip * 0.32;
    const nb = (brake && forwardSpeed > 1.5) ? MAX_BRAKE : 0;
    for (let i = 0; i < 4; i++) vehicle.setBrake(nb, i);
  } else {
    // Normal driving — use surface base grip for front
    vehicle.wheelInfos[0].frictionSlip = vehicle.wheelInfos[0]._surfaceBaseGrip;
    vehicle.wheelInfos[1].frictionSlip = vehicle.wheelInfos[1]._surfaceBaseGrip;
    // Rear: reduce grip under power at speed for natural oversteer
    let rearMult = 1.0;
    if (accel && speed > 8) rearMult = Math.max(0.5, 1.0 - speed * 0.008);
    if (lateralSpeed > 3 && accel) rearMult = Math.min(rearMult, 0.55);
    vehicle.wheelInfos[2].frictionSlip = vehicle.wheelInfos[2]._surfaceBaseGrip * rearMult;
    vehicle.wheelInfos[3].frictionSlip = vehicle.wheelInfos[3]._surfaceBaseGrip * rearMult;
    const nb = (brake && forwardSpeed > 1.5) ? MAX_BRAKE : 0;
    for (let i = 0; i < 4; i++) vehicle.setBrake(nb, i);
  }

  // ── Drift stabilization ──
  const angVelY = chassisBody.angularVelocity.y;
  if (Math.abs(angVelY) > 2.5) {
    chassisBody.angularVelocity.y = Math.sign(angVelY) * 2.5;
  }
  chassisBody.angularDamping = lateralSpeed > 3 ? 0.6 : 0.35;
  if (Math.abs(angVelY) > 2.0 && lateralSpeed > 2) {
    chassisBody.angularVelocity.y += -angVelY * 0.08;
  }

  // ═══════════════════════════════════════════════════════════════════
  // BRAKE LIGHTS
  // ═══════════════════════════════════════════════════════════════════
  const isBraking = brake && forwardSpeed > 1.5;
  const brakeIntensity = isBraking ? Math.min(1, forwardSpeed * 0.1) : 0;
  // Taillight emissive glow
  tlMat.emissiveIntensity = tlMatBase_emissiveIntensity + brakeIntensity * 1.6;
  // Point light behind car
  brakeLightPoint.intensity = brakeIntensity * 8;

  // ── Physics step ──
  while(accum>=fixedDt){world.step(fixedDt);accum-=fixedDt;}

  // ── Sync meshes (drop body visual so car doesn't float above wheels) ──
  carGroup.position.set(chassisBody.position.x, chassisBody.position.y - BODY_DROP, chassisBody.position.z);
  carGroup.quaternion.set(chassisBody.quaternion.x,chassisBody.quaternion.y,chassisBody.quaternion.z,chassisBody.quaternion.w);
  for(let i=0;i<4;i++){
    vehicle.updateWheelTransform(i);const t=vehicle.wheelInfos[i].worldTransform;
    wheelMeshes[i].position.set(t.position.x,t.position.y,t.position.z);
    wheelMeshes[i].quaternion.set(t.quaternion.x,t.quaternion.y,t.quaternion.z,t.quaternion.w);
  }

  // ── Tire track indentations ──
  if (speed > 1) {
    const carFwd = new THREE.Vector3(0,0,-1).applyQuaternion(carGroup.quaternion);
    for (let w=0;w<4;w++){
      const wi=vehicle.wheelInfos[w];
      if(!wi.raycastResult.body)continue;
      vehicle.updateWheelTransform(w);
      const wt=wi.worldTransform;
      const wp=new THREE.Vector3(wt.position.x, wt.position.y, wt.position.z);
      const isRear = w >= 2;
      if (isDrifting && isRear) {
        wheelTrails[w].add(wp, carFwd, 0.20, 0.06, 0.85);
      } else {
        wheelTrails[w].add(wp, carFwd, 0.14, 0.03, 0.55);
      }
    }
  }

  // ═══════════════════════════════════════════════════════════════════
  // AAA PARTICLE SYSTEM — Surface-Aware Dust, Smoke, Spray
  // ═══════════════════════════════════════════════════════════════════
  const wheelSpin = accel && speed < 6 && forwardSpeed < 5;
  const carFwdVec = new THREE.Vector3(0, 0, -1).applyQuaternion(carGroup.quaternion);
  const brakingHard = brake && forwardSpeed > 4;

  // Dynamically set dust particle color based on average surface
  // On road: dust is lighter gray. Off road: brown dirt
  const dustR = 0.53 + avgSurfaceBlend * 0.15;
  const dustG = 0.47 + avgSurfaceBlend * 0.15;
  const dustB = 0.33 + avgSurfaceBlend * 0.15;
  dustMat.uniforms.color.value.setRGB(dustR, dustG, dustB);

  // Set tire smoke color: white/light gray on road, slightly tan off road
  const smokeR = 0.75 + avgSurfaceBlend * 0.1;
  const smokeG = 0.75 + avgSurfaceBlend * 0.1;
  const smokeB = 0.72 + avgSurfaceBlend * 0.1;
  smokeMat.uniforms.color.value.setRGB(smokeR, smokeG, smokeB);

  for (let w = 0; w < 4; w++) {
    const wi = vehicle.wheelInfos[w];
    if (!wi.raycastResult.body) continue;
    const wp = wheelPositions[w];
    const isRear = w >= 2;
    const surfBlend = wheelSurfaceBlend[w]; // 0=offroad, 1=road
    const onRoadWheel = surfBlend > 0.5;

    // ── Wheelspin Rooster Tail (rear wheels, high throttle low speed) ──
    if (wheelSpin && isRear) {
      emitRoosterTail(wp.x, wp.y - 0.3, wp.z, carFwdVec.x, carFwdVec.z, onRoadWheel);
      // Tire marks during wheelspin
      const fwd3 = new THREE.Vector3(carFwdVec.x, 0, carFwdVec.z);
      const wp3 = new THREE.Vector3(wp.x, wp.y, wp.z);
      wheelTrails[w].add(wp3, fwd3, 0.18, 0.05, 0.75);
    }
    // ── Drifting particles ──
    else if (isDrifting && speed > 3) {
      if (onRoadWheel) {
        // ON-ROAD DRIFTING: tire smoke (white/gray) from rear wheels, all wheels during heavy braking
        if (isRear || brakingHard) {
          const smokeCount = isRear ? Math.floor(lateralSpeed * 0.8) : 1;
          emitTireSmoke(wp.x, wp.y - 0.25, wp.z, smokeCount, 0, 0);
          // Drift trail — ground-hugging smoke behind rear wheels
          if (isRear && lateralSpeed > 3) {
            emitDriftTrail(wp.x, wp.y - 0.35, wp.z, 1);
          }
        }
      } else {
        // OFF-ROAD DRIFTING: dirt spray with clumps and fine spray
        const intensity = isRear ? 2.0 : 0.8;
        emitDirtSpray(wp.x, wp.y - 0.3, wp.z, intensity, carFwdVec.x, carFwdVec.z);
      }
    }
    // ── Normal driving at speed ──
    else if (speed > 5 && isRear) {
      if (onRoadWheel) {
        // Light road dust
        emitDust(wp.x, wp.y - 0.3, wp.z, Math.min(0.4, speed / 40));
      } else {
        // Off-road: spray dirt
        emitDirtSpray(wp.x, wp.y - 0.3, wp.z, Math.min(1.2, speed / 15), carFwdVec.x, carFwdVec.z);
      }
    }

    // ── Brake Dust (all wheels, on-road heavy braking) ──
    if (brakingHard && onRoadWheel && speed > 8) {
      emitBrakeDust(wp.x, wp.y - 0.3, wp.z);
    }
  }

  updateDust(dt);
  updateSmoke(dt);
  updateSparks(dt);

  // ── Engine smoke (when front zone heavily damaged) ──
  if (smokeActive) {
    const hoodPos = new THREE.Vector3(0, 1.0, -1.5).applyQuaternion(carGroup.quaternion).add(carGroup.position);
    for (let i = 0; i < 2; i++) {
      const si = dustIdx % DUST_MAX; const d = dustData[si];
      d.life = 1.5 + Math.random() * 1.0;
      dustPos[si * 3] = hoodPos.x + (Math.random() - 0.5) * 0.4;
      dustPos[si * 3 + 1] = hoodPos.y;
      dustPos[si * 3 + 2] = hoodPos.z + (Math.random() - 0.5) * 0.4;
      d.vx = (Math.random() - 0.5) * 0.5; d.vy = 1.5 + Math.random() * 1.0; d.vz = (Math.random() - 0.5) * 0.5;
      dustSizes[si] = 2.5 + Math.random() * 2;
      dustIdx++;
    }
  }

  // ── Debris physics sync ──
  for (let i = debrisList.length - 1; i >= 0; i--) {
    const d = debrisList[i];
    d.timer -= dt;
    d.mesh.position.set(d.body.position.x, d.body.position.y, d.body.position.z);
    d.mesh.quaternion.set(d.body.quaternion.x, d.body.quaternion.y, d.body.quaternion.z, d.body.quaternion.w);
    if (d.timer < 2) {
      if (d.mesh.material) d.mesh.material.transparent = true;
      if (d.mesh.material) d.mesh.material.opacity = d.timer / 2;
    }
    if (d.timer <= 0) {
      scene.remove(d.mesh);
      world.removeBody(d.body);
      debrisList.splice(i, 1);
    }
  }

  // ── Wind Turbine Blades ──
  windTurbineBlades.forEach(g => { g.rotation.z += 0.8 * dt; });

  // ── Clouds ──
  clouds.forEach(c=>{
    c.mesh.position.x+=Math.cos(c.dir)*c.speed*dt;c.mesh.position.z+=Math.sin(c.dir)*c.speed*dt;
    if(c.mesh.position.x>350)c.mesh.position.x-=700;if(c.mesh.position.x<-350)c.mesh.position.x+=700;
    if(c.mesh.position.z>350)c.mesh.position.z-=700;if(c.mesh.position.z<-350)c.mesh.position.z+=700;
  });

  // ── Camera ──
  if(cameraMode==='chase')updateChaseCamera(dt);
  else{orbitControls.target.set(chassisBody.position.x,chassisBody.position.y+1,chassisBody.position.z);orbitControls.update();}

  // ── Update all systems ──
  updateShadowCam();updateHUD(speed);updateAudio(speed,accel);
  updateSurfaceSounds(speed, lateralSpeed, avgSurfaceBlend, isDrifting, brakingHard);
  updateLampLights(camera.position);
  renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
animate();
</script>
</body>
</html>
